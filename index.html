<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandra Iagovkina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FEDECF;
    --red:#DE0923;
    --ink:#2A0E08;
    --ink-soft:#6B3A30;
    --card:#FFF6EF;
    --line:rgba(42,14,8,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0 0 64px;
    overflow-x:hidden;
  }
  .page{
    width:100%;
    max-width:480px;
    padding:0 24px;
    position:relative;
  }
  .hero{
    position:relative;
    width:100%;
    margin:0 -24px;
    padding:0;
    overflow:visible;
    display:flex;
    justify-content:center;
  }
  .hero-inner{
    position:relative;
    width:100%;
    max-width:520px;
  }
  .hero-inner img{
    display:block;
    width:100%;
    height:auto;
    margin-top:0;
  }
  .logo{
    display:block;
    width:84%;
    max-width:320px;
    margin:-40px auto 0;
    position:relative;
    z-index:2;
  }
  .tagline{
    text-align:center;
    margin-top:10px;
    margin-bottom:36px;
    font-family:'Work Sans',sans-serif;
    font-size:14.5px;
    font-weight:500;
    color:var(--ink-soft);
    letter-spacing:0.03em;
  }
  .eye-divider{
    display:none;
  }
  .eye-divider .line{
    height:1px;
    flex:1;
    background:var(--line);
  }
  .eye-divider svg{
    width:26px;
    height:26px;
    flex-shrink:0;
    display:block;
  }
  .eye-divider .asterisk{
    font-size:26px;
    line-height:1;
    color:var(--ink);
    flex-shrink:0;
  }
  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .link-card{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--bg);
    border:1.5px solid var(--ink);
    border-radius:24px;
    padding:16px 20px;
    text-decoration:none;
    color:var(--ink);
    transition:transform 0.15s ease, opacity 0.15s ease;
  }
  .link-card:active{
    transform:scale(0.98);
  }
  .link-card:hover{
    opacity:0.85;
  }
  .icon{
    width:44px;
    height:44px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon img{
    width:44px;
    height:44px;
    display:block;
  }
  .link-sub{
    font-family:'Work Sans',sans-serif;
    font-size:13px;
    font-weight:400;
    color:var(--ink-soft);
    margin-top:5px;
  }
  .link-title{
    font-family:'Unbounded',sans-serif;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:0.005em;
    color:var(--ink);
  }
  .link-text{
    flex:1;
    min-width:0;
  }
  .link-title{
    font-family:'Unbounded',sans-serif;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:0.005em;
    color:var(--ink);
  }
  .link-sub{
    font-size:13px;
    font-weight:400;
    color:var(--ink-soft);
    margin-top:5px;
  }
  .arrow{
    width:16px;
    height:16px;
    flex-shrink:0;
    display:block;
    stroke:var(--ink-soft);
    fill:none;
    opacity:0.6;
  }
  footer{
    text-align:center;
    margin-top:40px;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    opacity:0.6;
  }
</style>
</head>
