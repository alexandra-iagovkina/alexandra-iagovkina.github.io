  :root{
    --bg:#000000;
    --red:#DE0923;
    --ink:#FFFFFF;
    --ink-soft:#FFFFFF;
    --card:#000000;
    --line:rgba(255,255,255,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;border:0;outline:0;}
  html{
    background:var(--bg);
    margin:0;
    padding:0;
  }
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
  }
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0 0 64px;
    overflow-x:hidden;
    margin:0;
  }
  .page{
    width:100%;
    max-width:480px;
    padding:0 24px;
    position:relative;
    background:var(--bg);
  }
  .hero{
    width:100%;
    background:var(--bg);
    -webkit-mask-image:linear-gradient(to bottom, black 0%, black 65%, transparent 100%);
    mask-image:linear-gradient(to bottom, black 0%, black 65%, transparent 100%);
  }
  .hero-inner{
    width:100%;
    background:var(--bg);
  }
  .hero-inner img{
    display:block;
    width:102.6%;
    height:auto;
    object-fit:contain;
    margin:0 -1.3%;
  }
  
  .logo{
    display:block;
    width:97.02%;
    max-width:296px;
    margin:-92px auto 16px;
    position:relative;
    z-index:2;
  }
  .tagline{
    text-align:center;
    margin-top:10px;
    margin-bottom:10px;
    font-family:'Work Sans',sans-serif;
    font-size:14.5px;
    font-weight:300;
    color:var(--ink-soft);
    letter-spacing:0.03em;
  }
  .eye-divider{
    display:none;
  }
  .eye-divider .line{
    height:1px;
    flex:1;
    background:var(--line);
  }
  .eye-divider svg{
    width:26px;
    height:26px;
    flex-shrink:0;
    display:block;
  }
  .eye-divider .asterisk{
    font-size:26px;
    line-height:1;
    color:var(--ink);
    flex-shrink:0;
  }
  
  .links{
    margin-top:-24px;
    display:flex;
    flex-direction:column;
    gap:11px;
  }
  .link-card{
    display:flex;
    align-items:center;
    gap:16px;
    background:#000000;
    border:1px solid var(--red);
    border-radius:14px;
    padding:13px 16px;
    text-decoration:none;
    color:var(--ink);
    transition:transform 0.15s ease, opacity 0.15s ease;
  }
  .link-card:active{
    transform:scale(0.98);
  }
  .link-card:hover{
    opacity:0.85;
  }
  .icon{
    width:44px;
    height:44px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon img{
    width:44px;
    height:44px;
    display:block;
  }
  .link-sub{
    font-family:'Work Sans',sans-serif;
    font-size:13px;
    font-weight:300;
    color:var(--ink-soft);
    margin-top:5px;
  }
  .link-title{
    font-family:'Ostrovsky',sans-serif;
    font-weight:700;
    font-size:16.56px;
    letter-spacing:0.005em;
    color:var(--ink);
  }
  .link-text{
    flex:1;
    min-width:0;
  }
  .link-title{
    font-family:'Ostrovsky',sans-serif;
    font-weight:700;
    font-size:16.56px;
    letter-spacing:0.005em;
    color:var(--ink);
  }
  .link-sub{
    font-size:13px;
    font-weight:300;
    color:var(--ink-soft);
    margin-top:5px;
  }
  .arrow{
    width:16px;
    height:16px;
    flex-shrink:0;
    display:block;
    stroke:var(--ink-soft);
    fill:none;
    opacity:0.6;
  }
  footer{
    text-align:center;
    margin-top:40px;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    opacity:0.6;
  }
</style>
